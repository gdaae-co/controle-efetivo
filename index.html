<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Controle Efetivo">
    <meta name="theme-color" content="#0f172a">
    <title>Controle de Efetivo - 1º GDAAE</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Firebase Compat SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif; background: #f1f5f9; }
        input, select, textarea, button { font-size: 16px !important; }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- Inicializa Firebase -->
    <script>
      const firebaseConfig = {
        apiKey: "AIzaSyAicrUUVodI5hXjvlKsObpsu4COsj4zKzM",
        authDomain: "controle-efetivo-gdaae.firebaseapp.com",
        projectId: "controle-efetivo-gdaae",
        storageBucket: "controle-efetivo-gdaae.firebasestorage.app",
        messagingSenderId: "429973959348",
        appId: "1:429973959348:web:9ab69b7cb1efe242ab5de1"
      };
      firebase.initializeApp(firebaseConfig);
      const db = firebase.firestore();
      const auth = firebase.auth();
    </script>

    <script type="text/babel">
      const { useState, useEffect } = React;
      const ADMIN_EMAIL = "matheusgarcia9607@gmail.com";

      function EfetivoApp() {
        const [user, setUser] = useState(null);
        const [userData, setUserData] = useState(null);
        const [email, setEmail] = useState('');
        const [password, setPassword] = useState('');
        const [error, setError] = useState('');
        const [militares, setMilitares] = useState([]);
        const [chamadas, setChamadas] = useState({});
        const [activeTab, setActiveTab] = useState('chamada');
        const [selectedDate, setSelectedDate] = useState(new Date().toISOString().split('T')[0]);
        const [selectedMonth, setSelectedMonth] = useState(new Date().toISOString().slice(0, 7));
        const [selectedMilitar, setSelectedMilitar] = useState('');
        const [fotoApp, setFotoApp] = useState(() => localStorage.getItem('fotoApp') || '');
        const [novoMilitar, setNovoMilitar] = useState({ nome: '', post: 'S1' });
        const [militarEmEdicao, setMilitarEmEdicao] = useState(null);
        const [busca, setBusca] = useState('');
        const [usersList, setUsersList] = useState([]);
        const [newUserEmail, setNewUserEmail] = useState('');
        const [newUserPassword, setNewUserPassword] = useState('');
        const [newUserNomeGuerra, setNewUserNomeGuerra] = useState('');
        const [newUserRole, setNewUserRole] = useState('user');
        const [editUserId, setEditUserId] = useState(null);
        const [editNomeGuerra, setEditNomeGuerra] = useState('');

        // Detecta login e carrega dados
        useEffect(() => {
          const unsubscribe = auth.onAuthStateChanged(async (u) => {
            setUser(u);
            if (u) {
              const userDoc = await db.collection("usuarios").doc(u.uid).get();
              if (userDoc.exists) {
                setUserData(userDoc.data());
              } else {
                const defaultRole = (u.email === ADMIN_EMAIL) ? "admin" : "user";
                await db.collection("usuarios").doc(u.uid).set({
                  email: u.email,
                  nomeGuerra: u.email.split('@')[0].toUpperCase(),
                  role: defaultRole,
                  createdAt: new Date().toISOString()
                });
                setUserData({ role: defaultRole, nomeGuerra: u.email.split('@')[0].toUpperCase() });
              }
            } else {
              setUserData(null);
            }
          });
          return unsubscribe;
        }, []);

        // Carrega lista global de militares
        useEffect(() => {
          db.collection("dados").doc("militares")
            .get()
            .then(doc => {
              if (doc.exists) {
                setMilitares(doc.data().lista || []);
              } else {
                const defaultList = [
                  { id: 1, nome: 'JULIO CESAR', post: 'CB' },
                  { id: 2, nome: 'DAHER', post: 'S1' },
                  { id: 3, nome: 'ROGÉRIO', post: 'S1' },
                  { id: 4, nome: 'BRASIL', post: 'S1' },
                  { id: 5, nome: 'VINICIUS', post: 'S1' },
                  { id: 6, nome: 'VIEIRA', post: 'S1' },
                  { id: 7, nome: 'FELIPE', post: 'S1' },
                  { id: 8, nome: 'EMERSON', post: 'S1' },
                  { id: 9, nome: 'DÊNIS', post: 'S1' },
                  { id: 10, nome: 'TOLENTINO', post: 'S1' },
                  { id: 11, nome: 'FANTINEL', post: 'S1' },
                  { id: 12, nome: 'JULIANO', post: 'S1' },
                  { id: 13, nome: 'THAÍS', post: 'S1' },
                  { id: 14, nome: 'J. COSTA', post: 'S1' },
                  { id: 15, nome: 'REGINALDO', post: 'S1' },
                  { id: 16, nome: 'ANDERSON', post: 'S1' },
                  { id: 17, nome: 'LEOTE', post: 'S1' },
                  { id: 18, nome: 'VILA NOVA', post: 'S1' },
                  { id: 19, nome: 'GUSTAVO MELO', post: 'S1' },
                  { id: 20, nome: 'ESPÍRITO SANTO', post: 'S1' },
                  { id: 21, nome: 'VINÍCIUS SÁ', post: 'S1' },
                  { id: 22, nome: 'ROBERTO', post: 'S1' },
                  { id: 23, nome: 'TÉOGENES', post: 'S1' },
                  { id: 24, nome: 'MARCELO', post: 'S1' },
                  { id: 25, nome: 'FERREIRA', post: 'S1' },
                  { id: 26, nome: 'OSCAR', post: 'S1' },
                  { id: 27, nome: 'FÁBIO', post: 'S1' },
                  { id: 28, nome: 'REPPETTO', post: 'S1' },
                  { id: 29, nome: 'LEANDRO', post: 'S1' },
                  { id: 30, nome: 'LUANA', post: 'S1' },
                  { id: 31, nome: 'MARCIO', post: 'S1' },
                  { id: 32, nome: 'MENEZES', post: 'S1' },
                  { id: 33, nome: 'COLOMBO', post: 'S1' },
                  { id: 34, nome: 'TERRA', post: 'S1' },
                  { id: 35, nome: 'TAMIOZZO', post: 'S1' },
                  { id: 36, nome: 'LENON', post: 'S1' },
                  { id: 37, nome: 'PROENÇA', post: 'S1' },
                  { id: 38, nome: 'GABRIEL LIMA', post: 'S1' },
                  { id: 39, nome: 'ANTÔNIO', post: 'S1' },
                  { id: 40, nome: 'RICKSON', post: 'S1' },
                  { id: 41, nome: 'COUTO', post: 'S1' },
                  { id: 42, nome: 'BENITES', post: 'S1' },
                  { id: 43, nome: 'TERRES', post: 'S1' },
                  { id: 44, nome: 'FANTI', post: 'S1' },
                  { id: 45, nome: 'GILBERTO', post: 'S1' },
                  { id: 46, nome: 'WAZEN', post: 'S1' },
                  { id: 47, nome: 'PERETTO', post: 'S1' },
                  { id: 48, nome: 'MAX', post: 'S1' },
                  { id: 49, nome: 'LEONARDO MACHADO', post: 'S1' },
                  { id: 50, nome: 'FREIRE', post: 'S1' },
                  { id: 51, nome: 'A. GARCIA', post: 'S1' },
                  { id: 52, nome: 'KRONBAUER', post: 'S1' },
                  { id: 53, nome: 'GYAN', post: 'S1' },
                  { id: 54, nome: 'SCHERER', post: 'S1' },
                  { id: 55, nome: 'SALOMÃO', post: 'S1' },
                  { id: 56, nome: 'SCHIAM', post: 'S1' },
                  { id: 57, nome: 'YAGO', post: 'S1' },
                  { id: 58, nome: 'RAFAEL LUZ', post: 'S1' },
                  { id: 59, nome: 'FABIAN', post: 'S1' },
                  { id: 60, nome: 'ABDUL', post: 'S1' }
                ];
                setMilitares(defaultList);
                db.collection("dados").doc("militares").set({ lista: defaultList });
              }
            });
        }, []);

        // Salva mudanças na lista global (só admin)
        useEffect(() => {
          if (!user || userData?.role !== "admin" || militares.length === 0) return;
          db.collection("dados").doc("militares").set({ lista: militares });
        }, [militares, userData]);

        // Carrega chamadas individuais
        useEffect(() => {
          if (!user) return;
          db.collection("usuarios").doc(user.uid).collection("dados").doc("chamadas")
            .get()
            .then(doc => {
              if (doc.exists) setChamadas(doc.data() || {});
            });
        }, [user]);

        const getExpediente = (dateStr) => {
          const date = new Date(dateStr + 'T00:00:00');
          const dayOfWeek = date.getDay();
          return dayOfWeek === 5 ? { inicio: '08:00', fim: '12:00' } : { inicio: '09:00', fim: '17:00' };
        };

        const getChamadaDodia = (date) => {
          if (!chamadas[date]) {
            const inicial = {};
            militares.forEach(m => {
              inicial[m.nome] = { status: 'PRESENTE', horario: '', observacao: '' };
            });
            setChamadas(prev => ({ ...prev, [date]: inicial }));
            if (user) {
              db.collection("usuarios").doc(user.uid).collection("dados").doc("chamadas")
                .set({ ...chamadas, [date]: inicial }, { merge: true });
            }
            return inicial;
          }
          return chamadas[date];
        };

        const salvarChamada = (date, militar, status, horario = '', observacao = '') => {
          const novaChamada = { ...chamadas };
          if (!novaChamada[date]) novaChamada[date] = {};
          novaChamada[date][militar] = { status, horario, observacao };
          setChamadas(novaChamada);
          if (user) {
            db.collection("usuarios").doc(user.uid).collection("dados").doc("chamadas")
              .set(novaChamada, { merge: true });
          }
        };

        const adicionarMilitar = () => {
          if (!novoMilitar.nome.trim()) return alert('Digite o nome!');
          const novoId = Math.max(...militares.map(m => m.id || 0), 0) + 1;
          const militar = { id: novoId, nome: novoMilitar.nome.toUpperCase(), post: novoMilitar.post };
          setMilitares([...militares, militar]);
          setNovoMilitar({ nome: '', post: 'S1' });
          alert('Militar adicionado!');
        };

        const editarMilitar = (id) => {
          const m = militares.find(m => m.id === id);
          setMilitarEmEdicao(m);
        };

        const salvarEdicao = () => {
          if (!militarEmEdicao.nome.trim()) return alert('Digite o nome!');
          setMilitares(militares.map(m =>
            m.id === militarEmEdicao.id ? { ...m, nome: militarEmEdicao.nome.toUpperCase(), post: militarEmEdicao.post } : m
          ));
          setMilitarEmEdicao(null);
          alert('Militar atualizado!');
        };

        const deletarMilitar = (id) => {
          if (window.confirm('Deletar este militar?')) setMilitares(militares.filter(m => m.id !== id));
        };

        const handleFotoUpload = (e) => {
          const file = e.target.files[0];
          if (file) {
            const reader = new FileReader();
            reader.onload = (event) => {
              const base64 = event.target.result;
              setFotoApp(base64);
              localStorage.setItem('fotoApp', base64);
            };
            reader.readAsDataURL(file);
          }
        };

        const removerFoto = () => {
          setFotoApp('');
          localStorage.removeItem('fotoApp');
        };

        const calcularEstatisticas = (militarFiltro = '') => {
          const stats = {};
          const listaMilitares = militarFiltro ? militares.filter(m => m.nome === militarFiltro) : militares;
          listaMilitares.forEach(m => stats[m.nome] = { presente: 0, falta: 0, atrasado: 0, total: 0 });
          Object.keys(chamadas).forEach(date => {
            if (date.startsWith(selectedMonth)) {
              Object.keys(chamadas[date]).forEach(militar => {
                if (stats[militar]) {
                  const { status } = chamadas[date][militar];
                  stats[militar].total++;
                  if (status === 'PRESENTE' || status === 'ATRASADO') stats[militar].presente++;
                  if (status === 'FALTA') stats[militar].falta++;
                }
              });
            }
          });
          return stats;
        };

        const exportarParaExcel = async () => {
          const datas = Object.keys(chamadas).sort();
          if (datas.length === 0) return alert('Nenhuma chamada registrada!');

          let htmlContent = `
            <!DOCTYPE html>
            <html>
            <head>
              <meta charset="UTF-8">
              <style>
                body { font-family: Arial, sans-serif; background: #f5f5f5; padding: 20px; }
                .container { background: white; max-width: 1200px; margin: 0 auto; padding: 40px; }
                .header { border-bottom: 3px solid #1f2937; padding-bottom: 20px; margin-bottom: 30px; }
                h1 { color: #1f2937; font-size: 28px; }
                table { width: 100%; border-collapse: collapse; margin-top: 20px; }
                th { background: #1f2937; color: white; padding: 15px; text-align: left; font-size: 13px; }
                td { padding: 12px 15px; border: 1px solid #e5e7eb; font-size: 13px; }
                .assinatura { 
                  margin-top: 80px; 
                  text-align: center; 
                  font-size: 16px; 
                  font-weight: bold; 
                  color: #1f2937; 
                }
                .linha-assinatura { 
                  width: 400px; 
                  border-bottom: 2px solid #000; 
                  margin: 50px auto 20px auto; 
                }
              </style>
            </head>
            <body>
              <div class="container">
                <div class="header">
                  <h1>📋 Relatório de Chamada - 1º GDAAE</h1>
                  <p style="text-align: right; color: #666; margin-bottom: 20px;">
                    Gerado por: ${userData?.nomeGuerra || user?.email || 'Desconhecido'} em ${new Date().toLocaleString('pt-BR')}
                  </p>
                </div>

                <table>
                  <thead>
                    <tr>
                      <th>Data</th>
                      <th>Militar</th>
                      <th>Posto</th>
                      <th>Status</th>
                      <th>Horário</th>
                      <th>Observação</th>
                    </tr>
                  </thead>
                  <tbody>
          `;

          // Inclui TODOS os militares em TODAS as datas
          datas.forEach(data => {
            militares.forEach(militar => {
              const chamadaDados = chamadas[data]?.[militar.nome] || { status: 'PRESENTE', horario: '', observacao: '' };
              htmlContent += `
                <tr>
                  <td>${data}</td>
                  <td>${militar.nome}</td>
                  <td>${militar.post}</td>
                  <td>${chamadaDados.status}</td>
                  <td>${chamadaDados.horario || '-'}</td>
                  <td>${chamadaDados.observacao || '-'}</td>
                </tr>
              `;
            });
          });

          htmlContent += `
                  </tbody>
                </table>

                <!-- Assinatura final -->
                <div class="assinatura">
                  <div class="linha-assinatura"></div>
                  CHEFE DA SUBSEÇÃO DE GESTÃO DE PESSOAL
                </div>

              </div>
            </body>
            </html>
          `;

          const blob = new Blob([htmlContent], { type: 'text/html;charset=utf-8' });
          const link = document.createElement('a');
          const url = URL.createObjectURL(blob);
          link.href = url;
          link.download = `Relatorio_${new Date().toISOString().slice(0, 10)}.html`;
          link.click();
          URL.revokeObjectURL(url);
        };

        // Gerenciar usuários (admin)
        useEffect(() => {
          if (userData?.role !== "admin") return;
          db.collection("usuarios").get().then(snapshot => {
            const list = [];
            snapshot.forEach(doc => list.push({ id: doc.id, ...doc.data() }));
            setUsersList(list);
          });
        }, [userData]);

        const criarUsuario = async () => {
          if (!newUserEmail || !newUserPassword || !newUserNomeGuerra.trim()) {
            return alert('Preencha email, senha e Nome de Guerra!');
          }
          try {
            const cred = await auth.createUserWithEmailAndPassword(newUserEmail, newUserPassword);
            await db.collection("usuarios").doc(cred.user.uid).set({
              email: newUserEmail,
              nomeGuerra: newUserNomeGuerra.trim().toUpperCase(),
              role: newUserRole,
              createdAt: new Date().toISOString()
            });
            alert('Usuário criado com sucesso!');
            setNewUserEmail('');
            setNewUserPassword('');
            setNewUserNomeGuerra('');
          } catch (err) {
            alert('Erro ao criar: ' + err.message);
          }
        };

        const editarNomeGuerra = async () => {
          if (!editNomeGuerra.trim()) return alert('Digite o novo Nome de Guerra!');
          try {
            await db.collection("usuarios").doc(editUserId).update({
              nomeGuerra: editNomeGuerra.trim().toUpperCase()
            });
            alert('Nome de Guerra atualizado!');
            setEditUserId(null);
            setEditNomeGuerra('');
            const updatedList = usersList.map(u =>
              u.id === editUserId ? { ...u, nomeGuerra: editNomeGuerra.trim().toUpperCase() } : u
            );
            setUsersList(updatedList);
          } catch (err) {
            alert('Erro: ' + err.message);
          }
        };

        if (!user) {
          return (
            <div className="min-h-screen flex items-center justify-center bg-slate-100 p-4">
              <div className="bg-white p-8 rounded-lg shadow-xl max-w-md w-full">
                <h1 className="text-2xl font-bold mb-6 text-center">Controle de Efetivo</h1>
                {error && <p className="text-red-600 mb-4 text-center">{error}</p>}
                <input type="email" placeholder="Email" value={email} onChange={e => setEmail(e.target.value)} className="w-full p-3 mb-4 border rounded" />
                <input type="password" placeholder="Senha" value={password} onChange={e => setPassword(e.target.value)} className="w-full p-3 mb-4 border rounded" />
                <button onClick={() => auth.signInWithEmailAndPassword(email, password).catch(err => setError(err.message))} className="w-full bg-blue-600 text-white p-3 rounded mb-2 font-semibold">
                  Entrar
                </button>
                <p className="text-center text-sm text-gray-600 mt-4">Contate o administrador para criar uma conta.</p>
              </div>
            </div>
          );
        }

        const isAdmin = userData?.role === "admin";
        const estatisticas = calcularEstatisticas(selectedMilitar);
        const chamadaDia = getChamadaDodia(selectedDate);
        const expediente = getExpediente(selectedDate);
        const dayName = new Date(selectedDate + 'T00:00:00').toLocaleDateString('pt-BR', { weekday: 'long' });
        const militaresFiltrados = militares.filter(m =>
          m.nome.toLowerCase().includes(busca.toLowerCase()) ||
          m.post.toLowerCase().includes(busca.toLowerCase())
        );
        const postos = ['Cel', 'TC', 'MJ', 'CP', '1T', '2T', 'ASP', 'SO', '1S', '2S', '3S', 'CB', 'S1', 'S2'];

        return (
          <div className="min-h-screen bg-gradient-to-br from-slate-50 to-slate-100 pb-20 relative">
            {/* Header */}
            <div className="bg-gradient-to-r from-slate-900 to-slate-800 text-white sticky top-0 z-40 shadow-lg">
              <div className="px-4 py-4 sm:py-6">
                <div className="flex items-center gap-3 flex-wrap">
                  {fotoApp && (
                    <div className="w-12 h-12 bg-white rounded-lg overflow-hidden shadow-md flex-shrink-0">
                      <img src={fotoApp} alt="Logo" className="w-full h-full object-cover" />
                    </div>
                  )}
                  <div className="flex-1">
                    <h1 className="text-xl sm:text-2xl font-bold">Controle de Efetivo</h1>
                    <p className="text-xs sm:text-sm text-slate-300">1º GDAAE</p>
                  </div>
                  <div className="text-right text-xs text-slate-300">
                    <p className="font-bold text-white">{militares.length}</p>
                    <p>Militares</p>
                  </div>
                </div>
                <div className="mt-2 flex justify-between items-center">
                  <p className="text-sm text-green-400">
                    Logado como: <strong>{userData?.nomeGuerra || user.email.split('@')[0].toUpperCase()}</strong> ({userData?.role || 'carregando'})
                  </p>
                  <button onClick={() => auth.signOut()} className="bg-red-600 text-white px-4 py-1 rounded text-sm">
                    Sair
                  </button>
                </div>
              </div>
            </div>

            {/* Tabs */}
            <div className="px-2 sm:px-4 mt-4">
              <div className="flex gap-1 bg-white rounded-lg shadow-md p-2 border-b-4 border-slate-900 overflow-x-auto">
                <button
                  onClick={() => setActiveTab('chamada')}
                  className={`px-3 py-2 sm:px-4 sm:py-3 rounded-lg font-semibold text-xs sm:text-sm whitespace-nowrap transition-all ${
                    activeTab === 'chamada' ? 'bg-slate-900 text-white' : 'bg-slate-100 text-slate-700'
                  }`}
                >
                  📋 Chamada
                </button>
                <button
                  onClick={() => setActiveTab('estatisticas')}
                  className={`px-3 py-2 sm:px-4 sm:py-3 rounded-lg font-semibold text-xs sm:text-sm whitespace-nowrap transition-all ${
                    activeTab === 'estatisticas' ? 'bg-slate-900 text-white' : 'bg-slate-100 text-slate-700'
                  }`}
                >
                  📊 Stats
                </button>
                <button
                  onClick={() => setActiveTab('militares')}
                  className={`px-3 py-2 sm:px-4 sm:py-3 rounded-lg font-semibold text-xs sm:text-sm whitespace-nowrap transition-all ${
                    activeTab === 'militares' ? 'bg-slate-900 text-white' : 'bg-slate-100 text-slate-700'
                  }`}
                >
                  👥 Militares
                </button>
                {isAdmin && (
                  <button
                    onClick={() => setActiveTab('configuracoes')}
                    className={`px-3 py-2 sm:px-4 sm:py-3 rounded-lg font-semibold text-xs sm:text-sm whitespace-nowrap transition-all ${
                      activeTab === 'configuracoes' ? 'bg-slate-900 text-white' : 'bg-slate-100 text-slate-700'
                    }`}
                  >
                    ⚙️ Configurações
                  </button>
                )}
              </div>

              {/* Conteúdo */}
              <div className="bg-white rounded-b-lg shadow-lg p-3 sm:p-6 mt-1">
                {activeTab === 'chamada' && (
                  <div className="space-y-4">
                    <div className="bg-gradient-to-r from-blue-50 to-blue-100 p-4 rounded-lg border-2 border-blue-300">
                      <div className="flex gap-2 flex-col sm:flex-row">
                        <input
                          type="date"
                          value={selectedDate}
                          onChange={(e) => setSelectedDate(e.target.value)}
                          className="flex-1 px-3 py-2 border-2 border-blue-300 rounded-lg font-semibold text-sm"
                        />
                        <button
                          onClick={exportarParaExcel}
                          className="bg-green-600 text-white px-4 py-2 rounded-lg font-semibold text-sm"
                        >
                          📥 Exportar
                        </button>
                      </div>
                      <div className="flex gap-4 mt-2 text-sm">
                        <div>
                          <p className="text-xs text-slate-600">Dia</p>
                          <p className="font-bold capitalize">{dayName.slice(0, 3)}</p>
                        </div>
                        <div>
                          <p className="text-xs text-slate-600">Expediente</p>
                          <p className="font-bold text-sm">{expediente.inicio}-{expediente.fim}</p>
                        </div>
                      </div>
                    </div>

                    <div className="space-y-3">
                      <div className="grid gap-3 max-h-[70vh] overflow-y-auto pb-4">
                        {militares.map((militar) => {
                          const dados = chamadaDia[militar.nome] || { status: 'PRESENTE', horario: '', observacao: '' };
                          return (
                            <div key={militar.id} className="bg-slate-50 border-2 border-slate-200 rounded-lg p-3 shadow-sm">
                              <div className="flex justify-between items-start mb-2">
                                <div>
                                  <p className="font-bold text-base text-slate-900">{militar.nome}</p>
                                  <p className="text-sm text-slate-600">{militar.post}</p>
                                </div>
                                <span className={`text-xs font-bold text-white px-3 py-1 rounded-full ${
                                  dados.status === 'PRESENTE' ? 'bg-green-600' :
                                  dados.status === 'ATRASADO' ? 'bg-yellow-600' :
                                  dados.status ? 'bg-blue-600' : 'bg-slate-500'
                                }`}>
                                  {dados.status}
                                </span>
                              </div>
                              <div className="flex flex-wrap gap-2 items-center">
                                <select
                                  value={dados.status}
                                  onChange={(e) => salvarChamada(selectedDate, militar.nome, e.target.value, dados.horario, dados.observacao)}
                                  className="min-w-[150px] px-3 py-2 border-2 border-slate-300 rounded-lg font-medium text-sm focus:outline-none focus:border-blue-500"
                                >
                                  <option value="PRESENTE">PRESENTE</option>
                                  <option value="ATRASADO">ATRASADO</option>
                                  <option value="ESV">ESV</option>
                                  <option value="SSV">SSV</option>
                                  <option value="DISP TOTAL">DISP TOTAL</option>
                                  <option value="DISP PARCIAL">DISP PARCIAL</option>
                                  <option value="FORMATURA">FORMATURA</option>
                                  <option value="DISP MÉD">DISP MÉD</option>
                                  <option value="DISP INSTALAÇÃO">DISP INSTALAÇÃO</option>
                                  <option value="DISP TRANSITO">DISP TRANSITO</option>
                                  <option value="CURSO">CURSO</option>
                                  <option value="MISSÃO">MISSÃO</option>
                                  <option value="HACO">HACO</option>
                                  <option value="JRS">JRS</option>
                                  <option value="LUTO">LUTO</option>
                                  <option value="NÚPCIAS">NÚPCIAS</option>
                                  <option value="PRESO">PRESO</option>
                                  <option value="PSF">PSF</option>
                                  <option value="SOMBRA">SOMBRA</option>
                                  <option value="COMISSÃO">COMISSÃO</option>
                                  <option value="TACF">TACF</option>
                                  <option value="RECESSO">RECESSO</option>
                                  <option value="FÉRIAS">FÉRIAS</option>
                                  <option value="LICENSA PATERNIDADE">LICENSA PATERNIDADE</option>
                                  <option value="DOAR SANGUE">DOAR SANGUE</option>
                                  <option value="REUNIÃO">REUNIÃO</option>
                                  <option value="AGDL">AGDL</option>
                                </select>
                                {(dados.status === 'PRESENTE' || dados.status === 'ATRASADO') && (
                                  <input
                                    type="time"
                                    value={dados.horario}
                                    onChange={(e) => salvarChamada(selectedDate, militar.nome, dados.status, e.target.value, dados.observacao)}
                                    className="w-28 px-3 py-2 border-2 border-slate-300 rounded-lg text-sm"
                                  />
                                )}
                                <input
                                  type="text"
                                  value={dados.observacao}
                                  onChange={(e) => salvarChamada(selectedDate, militar.nome, dados.status, dados.horario, e.target.value)}
                                  placeholder="Observação..."
                                  className="flex-1 min-w-[160px] px-3 py-2 border-2 border-slate-300 rounded-lg text-sm placeholder:text-slate-400 focus:outline-none focus:border-blue-500"
                                />
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  </div>
                )}

                {activeTab === 'estatisticas' && (
                  <div className="space-y-4">
                    <div className="flex gap-2 flex-col sm:flex-row">
                      <input
                        type="month"
                        value={selectedMonth}
                        onChange={(e) => setSelectedMonth(e.target.value)}
                        className="flex-1 px-3 py-2 border-2 border-slate-300 rounded-lg font-semibold text-sm"
                      />
                      <select
                        value={selectedMilitar}
                        onChange={(e) => setSelectedMilitar(e.target.value)}
                        className="flex-1 px-3 py-2 border-2 border-slate-300 rounded-lg font-semibold text-sm"
                      >
                        <option value="">Todos</option>
                        {militares.map((m) => (
                          <option key={m.id} value={m.nome}>{m.nome.slice(0, 15)}</option>
                        ))}
                      </select>
                    </div>

                    {selectedMilitar && (
                      <div className="bg-blue-50 border-2 border-blue-300 p-4 rounded-lg">
                        <p className="font-bold text-sm text-blue-900 mb-3">{selectedMilitar}</p>
                        <div className="grid grid-cols-2 gap-2">
                          <div className="bg-white p-3 rounded border text-center">
                            <p className="text-xs text-gray-600">Dias</p>
                            <p className="text-2xl font-bold text-blue-600">{estatisticas[selectedMilitar]?.total || 0}</p>
                          </div>
                          <div className="bg-white p-3 rounded border text-center">
                            <p className="text-xs text-gray-600">Presentes</p>
                            <p className="text-2xl font-bold text-green-600">{estatisticas[selectedMilitar]?.presente || 0}</p>
                          </div>
                          <div className="bg-white p-3 rounded border text-center">
                            <p className="text-xs text-gray-600">Faltas</p>
                            <p className="text-2xl font-bold text-red-600">{estatisticas[selectedMilitar]?.falta || 0}</p>
                          </div>
                          <div className="bg-white p-3 rounded border text-center">
                            <p className="text-xs text-gray-600">Taxa</p>
                            <p className="text-2xl font-bold text-purple-600">
                              {estatisticas[selectedMilitar]?.total > 0
                                ? ((estatisticas[selectedMilitar].presente / estatisticas[selectedMilitar].total) * 100).toFixed(0)
                                : 0}%
                            </p>
                          </div>
                        </div>
                      </div>
                    )}

                    <div className="bg-slate-50 p-4 rounded-lg border-2 border-slate-200 overflow-x-auto">
                      <table className="w-full text-xs">
                        <thead className="bg-slate-900 text-white">
                          <tr>
                            <th className="px-2 py-2 text-left">Militar</th>
                            <th className="px-2 py-2 text-center">Dias</th>
                            <th className="px-2 py-2 text-center">Pres</th>
                            <th className="px-2 py-2 text-center">Fal</th>
                            <th className="px-2 py-2 text-center">%</th>
                          </tr>
                        </thead>
                        <tbody>
                          {(selectedMilitar ? militares.filter(m => m.nome === selectedMilitar) : militares).map((m) => {
                            const stats = estatisticas[m.nome];
                            const taxa = stats.total > 0 ? ((stats.presente / stats.total) * 100).toFixed(0) : 0;
                            return (
                              <tr key={m.id} className="border-b">
                                <td className="px-2 py-1 text-xs">{m.nome.slice(0, 12)}</td>
                                <td className="px-2 py-1 text-center">{stats.total}</td>
                                <td className="px-2 py-1 text-center text-green-700">{stats.presente}</td>
                                <td className="px-2 py-1 text-center text-red-700">{stats.falta}</td>
                                <td className="px-2 py-1 text-center font-bold">{taxa}%</td>
                              </tr>
                            );
                          })}
                        </tbody>
                      </table>
                    </div>
                  </div>
                )}

                {activeTab === 'militares' && (
                  <div className="space-y-4">
                    {isAdmin && (
                      <div className="flex gap-2 flex-col sm:flex-row">
                        <input
                          type="text"
                          value={novoMilitar.nome}
                          onChange={(e) => setNovoMilitar({ ...novoMilitar, nome: e.target.value })}
                          placeholder="Nome"
                          className="flex-1 px-3 py-2 border-2 border-blue-300 rounded-lg text-sm"
                        />
                        <select
                          value={novoMilitar.post}
                          onChange={(e) => setNovoMilitar({ ...novoMilitar, post: e.target.value })}
                          className="flex-1 px-3 py-2 border-2 border-blue-300 rounded-lg text-sm"
                        >
                          {postos.map(post => (
                            <option key={post} value={post}>{post}</option>
                          ))}
                        </select>
                        <button
                          onClick={adicionarMilitar}
                          className="bg-blue-600 text-white px-4 py-2 rounded-lg font-semibold text-sm whitespace-nowrap"
                        >
                          ➕ Adicionar
                        </button>
                      </div>
                    )}

                    <input
                      type="text"
                      value={busca}
                      onChange={(e) => setBusca(e.target.value)}
                      placeholder="🔍 Buscar..."
                      className="w-full px-3 py-2 border-2 border-slate-300 rounded-lg text-sm"
                    />

                    <div className="space-y-2 max-h-96 overflow-y-auto">
                      {militaresFiltrados.map((militar, index) => (
                        <div
                          key={militar.id}
                          className="bg-slate-50 border-2 border-slate-200 rounded-lg p-3 flex items-center justify-between gap-2"
                        >
                          <div className="flex-1 min-w-0">
                            <p className="font-bold text-sm truncate">{militar.nome}</p>
                            <p className="text-xs text-slate-600">{militar.post}</p>
                          </div>
                          <div className="flex gap-1 items-center flex-shrink-0">
                            {isAdmin && (
                              <>
                                <button
                                  onClick={() => {
                                    if (index > 0) {
                                      const novaLista = [...militares];
                                      [novaLista[index - 1], novaLista[index]] = [novaLista[index], novaLista[index - 1]];
                                      setMilitares(novaLista);
                                    }
                                  }}
                                  disabled={index === 0}
                                  className={`px-2 py-1 rounded text-xs font-bold ${
                                    index === 0 ? 'bg-gray-300 text-gray-500 cursor-not-allowed' : 'bg-indigo-600 text-white hover:bg-indigo-700'
                                  }`}
                                  title="Subir posição"
                                >
                                  ↑
                                </button>
                                <button
                                  onClick={() => {
                                    if (index < militares.length - 1) {
                                      const novaLista = [...militares];
                                      [novaLista[index], novaLista[index + 1]] = [novaLista[index + 1], novaLista[index]];
                                      setMilitares(novaLista);
                                    }
                                  }}
                                  disabled={index === militares.length - 1}
                                  className={`px-2 py-1 rounded text-xs font-bold ${
                                    index === militares.length - 1 ? 'bg-gray-300 text-gray-500 cursor-not-allowed' : 'bg-indigo-600 text-white hover:bg-indigo-700'
                                  }`}
                                  title="Descer posição"
                                >
                                  ↓
                                </button>
                                <button
                                  onClick={() => editarMilitar(militar.id)}
                                  className="bg-blue-600 text-white px-2 py-1 rounded text-xs font-semibold"
                                >
                                  ✏️
                                </button>
                                <button
                                  onClick={() => deletarMilitar(militar.id)}
                                  className="bg-red-600 text-white px-2 py-1 rounded text-xs font-semibold"
                                >
                                  🗑️
                                </button>
                              </>
                            )}
                          </div>
                        </div>
                      ))}
                    </div>

                    {militarEmEdicao && isAdmin && (
                      <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
                        <div className="bg-white rounded-lg p-4 max-w-xs w-full shadow-2xl">
                          <h3 className="font-bold text-lg mb-3">✏️ Editar Militar</h3>
                          <input
                            type="text"
                            value={militarEmEdicao.nome}
                            onChange={(e) => setMilitarEmEdicao({ ...militarEmEdicao, nome: e.target.value })}
                            className="w-full px-3 py-2 border-2 border-slate-300 rounded-lg text-sm mb-3"
                          />
                          <select
                            value={militarEmEdicao.post}
                            onChange={(e) => setMilitarEmEdicao({ ...militarEmEdicao, post: e.target.value })}
                            className="w-full px-3 py-2 border-2 border-slate-300 rounded-lg text-sm mb-3"
                          >
                            {postos.map(post => (
                              <option key={post} value={post}>{post}</option>
                            ))}
                          </select>
                          <div className="flex gap-2">
                            <button
                              onClick={salvarEdicao}
                              className="flex-1 bg-blue-600 text-white px-4 py-2 rounded-lg font-semibold text-sm"
                            >
                              Salvar
                            </button>
                            <button
                              onClick={() => setMilitarEmEdicao(null)}
                              className="flex-1 bg-slate-400 text-white px-4 py-2 rounded-lg font-semibold text-sm"
                            >
                              Fechar
                            </button>
                          </div>
                        </div>
                      </div>
                    )}
                  </div>
                )}

                {activeTab === 'configuracoes' && isAdmin && (
                  <div className="space-y-4">
                    <h2 className="font-bold text-lg">⚙️ Configurações</h2>

                    <div className="bg-blue-50 border-2 border-blue-300 p-4 rounded-lg">
                      <p className="font-bold text-sm mb-3">📸 Logo/Foto</p>
                      {fotoApp && (
                        <div className="mb-3 flex gap-3 items-center">
                          <img src={fotoApp} alt="Foto" className="w-16 h-16 rounded-lg border-2 border-blue-300" />
                          <button
                            onClick={removerFoto}
                            className="bg-red-600 text-white px-3 py-2 rounded text-xs font-semibold whitespace-nowrap"
                          >
                            🗑️ Remover
                          </button>
                        </div>
                      )}
                      <label className="bg-blue-600 text-white px-4 py-2 rounded-lg font-semibold text-sm inline-block cursor-pointer">
                        📤 Selecionar
                        <input
                          type="file"
                          accept="image/*"
                          onChange={handleFotoUpload}
                          className="hidden"
                        />
                      </label>
                    </div>

                    <div className="bg-purple-50 border-2 border-purple-300 p-4 rounded-lg">
                      <p className="font-bold text-sm mb-2">ℹ️ Info</p>
                      <p className="text-xs text-slate-700">Militares: {militares.length}</p>
                      <p className="text-xs text-slate-700">Chamadas: {Object.keys(chamadas).length} dias</p>
                      <p className="text-xs text-slate-700 mt-2">v2.1 - Com Observações e Controle de Acesso</p>
                    </div>

                    {/* Gerenciar Usuários */}
                    <div className="bg-green-50 border-2 border-green-300 p-4 rounded-lg">
                      <h3 className="font-bold text-lg mb-3">👥 Gerenciar Usuários (Admin)</h3>
                      <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
                        <input
                          type="email"
                          placeholder="Email do novo usuário"
                          value={newUserEmail}
                          onChange={e => setNewUserEmail(e.target.value)}
                          className="p-2 border rounded w-full"
                        />
                        <input
                          type="password"
                          placeholder="Senha inicial"
                          value={newUserPassword}
                          onChange={e => setNewUserPassword(e.target.value)}
                          className="p-2 border rounded w-full"
                        />
                        <input
                          type="text"
                          placeholder="Nome de Guerra (ex: 3S OSCAR)"
                          value={newUserNomeGuerra}
                          onChange={e => setNewUserNomeGuerra(e.target.value)}
                          className="p-2 border rounded w-full"
                        />
                        <select
                          value={newUserRole}
                          onChange={e => setNewUserRole(e.target.value)}
                          className="p-2 border rounded w-full"
                        >
                          <option value="user">Usuário comum</option>
                          <option value="admin">Admin</option>
                        </select>
                      </div>
                      <button
                        onClick={criarUsuario}
                        className="bg-green-600 text-white px-6 py-2 rounded font-semibold"
                      >
                        Criar Usuário
                      </button>

                      <h4 className="mt-6 mb-2 font-semibold">Usuários cadastrados</h4>
                      <div className="space-y-2">
                        {usersList.map(u => (
                          <div key={u.id} className="bg-gray-100 p-3 rounded flex justify-between items-center">
                            <div>
                              <p className="font-medium">{u.nomeGuerra || u.email}</p>
                              <p className="text-sm text-gray-600">Email: {u.email}</p>
                              <p className="text-sm text-gray-600">Role: {u.role}</p>
                            </div>
                            <div className="flex gap-2">
                              <button
                                onClick={() => {
                                  setEditUserId(u.id);
                                  setEditNomeGuerra(u.nomeGuerra || '');
                                }}
                                className="bg-yellow-500 text-white px-3 py-1 rounded text-xs font-semibold"
                              >
                                Editar Nome
                              </button>
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>
                  </div>
                )}
              </div>
            </div>

            {/* Modal para editar Nome de Guerra */}
            {editUserId && (
              <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
                <div className="bg-white rounded-lg p-6 max-w-sm w-full shadow-2xl">
                  <h3 className="font-bold text-lg mb-4">Editar Nome de Guerra</h3>
                  <input
                    type="text"
                    value={editNomeGuerra}
                    onChange={(e) => setEditNomeGuerra(e.target.value)}
                    placeholder="Novo Nome de Guerra"
                    className="w-full px-3 py-2 border-2 border-slate-300 rounded-lg text-sm mb-4"
                  />
                  <div className="flex gap-2">
                    <button
                      onClick={editarNomeGuerra}
                      className="flex-1 bg-green-600 text-white px-4 py-2 rounded-lg font-semibold text-sm"
                    >
                      Salvar
                    </button>
                    <button
                      onClick={() => {
                        setEditUserId(null);
                        setEditNomeGuerra('');
                      }}
                      className="flex-1 bg-slate-400 text-white px-4 py-2 rounded-lg font-semibold text-sm"
                    >
                      Cancelar
                    </button>
                  </div>
                </div>
              </div>
            )}

            {/* Rodapé com autoria */}
            <footer className="fixed bottom-0 left-0 right-0 bg-slate-900 text-white text-center py-2 text-xs shadow-lg z-50">
              <p>Programa desenvolvido por 3S SGS OSCAR</p>
              <p className="text-slate-400 mt-1">© {new Date().getFullYear()} - Todos os direitos reservados</p>
            </footer>
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<EfetivoApp />);
    </script>
</body>
</html>
