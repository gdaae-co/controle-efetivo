<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Efetivo - 1º GDAAE</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.10.0/Recharts.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@latest"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function EfetevoApp() {
            const [militares, setMilitares] = useState(() => {
                try {
                    const saved = localStorage.getItem('militares');
                    if (saved) return JSON.parse(saved);
                    return [
                        { id: 1, nome: 'JULIO CESAR', post: 'Cabo' },
                        { id: 2, nome: 'DAHER', post: 'Soldado' },
                        { id: 3, nome: 'ROGÉRIO', post: 'Soldado' },
                        { id: 4, nome: 'BRASIL', post: 'Soldado' },
                        { id: 5, nome: 'VINICIUS', post: 'Soldado' },
                        { id: 6, nome: 'VIEIRA', post: 'Soldado' },
                        { id: 7, nome: 'FELIPE', post: 'Soldado' },
                        { id: 8, nome: 'EMERSON', post: 'Soldado' },
                        { id: 9, nome: 'DÊNIS', post: 'Soldado' },
                        { id: 10, nome: 'TOLENTINO', post: 'Soldado' },
                        { id: 11, nome: 'FANTINEL', post: 'Soldado' },
                        { id: 12, nome: 'JULIANO', post: 'Soldado' },
                        { id: 13, nome: 'THAÍS', post: 'Soldado' },
                        { id: 14, nome: 'J. COSTA', post: 'Soldado' },
                        { id: 15, nome: 'REGINALDO', post: 'Soldado' },
                        { id: 16, nome: 'ANDERSON', post: 'Soldado' },
                        { id: 17, nome: 'LEOTE', post: 'Soldado' },
                        { id: 18, nome: 'VILA NOVA', post: 'Soldado' },
                        { id: 19, nome: 'GUSTAVO MELO', post: 'Soldado' },
                        { id: 20, nome: 'ESPÍRITO SANTO', post: 'Soldado' },
                        { id: 21, nome: 'VINÍCIUS SÁ', post: 'Soldado' },
                        { id: 22, nome: 'ROBERTO', post: 'Soldado' },
                        { id: 23, nome: 'TÉOGENES', post: 'Soldado' },
                        { id: 24, nome: 'MARCELO', post: 'Soldado' },
                        { id: 25, nome: 'FERREIRA', post: 'Soldado' },
                        { id: 26, nome: 'OSCAR', post: 'Soldado' },
                        { id: 27, nome: 'FÁBIO', post: 'Soldado' },
                        { id: 28, nome: 'REPPETTO', post: 'Soldado' },
                        { id: 29, nome: 'LEANDRO', post: 'Soldado' },
                        { id: 30, nome: 'LUANA', post: 'Soldado' },
                        { id: 31, nome: 'MARCIO', post: 'Soldado' },
                        { id: 32, nome: 'MENEZES', post: 'Soldado' },
                        { id: 33, nome: 'COLOMBO', post: 'Soldado' },
                        { id: 34, nome: 'TERRA', post: 'Soldado' },
                        { id: 35, nome: 'TAMIOZZO', post: 'Soldado' },
                        { id: 36, nome: 'LENON', post: 'Soldado' },
                        { id: 37, nome: 'PROENÇA', post: 'Soldado' },
                        { id: 38, nome: 'GABRIEL LIMA', post: 'Soldado' },
                        { id: 39, nome: 'ANTÔNIO', post: 'Soldado' },
                        { id: 40, nome: 'RICKSON', post: 'Soldado' },
                        { id: 41, nome: 'COUTO', post: 'Soldado' },
                        { id: 42, nome: 'BENITES', post: 'Soldado' },
                        { id: 43, nome: 'TERRES', post: 'Soldado' },
                        { id: 44, nome: 'FANTI', post: 'Soldado' },
                        { id: 45, nome: 'GILBERTO', post: 'Soldado' },
                        { id: 46, nome: 'WAZEN', post: 'Soldado' },
                        { id: 47, nome: 'PERETTO', post: 'Soldado' },
                        { id: 48, nome: 'MAX', post: 'Soldado' },
                        { id: 49, nome: 'LEONARDO MACHADO', post: 'Soldado' },
                        { id: 50, nome: 'FREIRE', post: 'Soldado' },
                        { id: 51, nome: 'A. GARCIA', post: 'Soldado' },
                        { id: 52, nome: 'KRONBAUER', post: 'Soldado' },
                        { id: 53, nome: 'GYAN', post: 'Soldado' },
                        { id: 54, nome: 'SCHERER', post: 'Soldado' },
                        { id: 55, nome: 'SALOMÃO', post: 'Soldado' },
                        { id: 56, nome: 'SCHIAM', post: 'Soldado' },
                        { id: 57, nome: 'YAGO', post: 'Soldado' },
                        { id: 58, nome: 'RAFAEL LUZ', post: 'Soldado' },
                        { id: 59, nome: 'FABIAN', post: 'Soldado' },
                        { id: 60, nome: 'ABDUL', post: 'Soldado' }
                    ];
                } catch {
                    return [];
                }
            });

            const [activeTab, setActiveTab] = useState('chamada');
            const [selectedDate, setSelectedDate] = useState(new Date().toISOString().split('T')[0]);
            const [chamadas, setChamadas] = useState(() => {
                try {
                    const saved = localStorage.getItem('chamadas');
                    return saved ? JSON.parse(saved) : {};
                } catch {
                    return {};
                }
            });
            const [selectedMonth, setSelectedMonth] = useState(new Date().toISOString().slice(0, 7));
            const [selectedMilitar, setSelectedMilitar] = useState('');
            const [fotoApp, setFotoApp] = useState(() => {
                try {
                    return localStorage.getItem('fotoApp') || '';
                } catch {
                    return '';
                }
            });

            const [novoMilitar, setNovoMilitar] = useState({ nome: '', post: 'Soldado' });
            const [militarEmEdicao, setMilitarEmEdicao] = useState(null);
            const [busca, setBusca] = useState('');

            useEffect(() => {
                try {
                    localStorage.setItem('militares', JSON.stringify(militares));
                } catch (e) {
                    console.log('Erro ao salvar militares');
                }
            }, [militares]);

            const getExpediente = (dateStr) => {
                const date = new Date(dateStr + 'T00:00:00');
                const dayOfWeek = date.getDay();
                return dayOfWeek === 5 ? { inicio: '08:00', fim: '12:00' } : { inicio: '09:00', fim: '17:00' };
            };

            const getChamadaDodia = (date) => {
                if (!chamadas[date]) {
                    chamadas[date] = {};
                    militares.forEach(m => {
                        chamadas[date][m.nome] = { status: '', horario: '', observacao: '' };
                    });
                }
                return chamadas[date];
            };

            const salvarChamada = (date, militar, status, horario = '', observacao = '') => {
                const novaChamada = { ...chamadas };
                if (!novaChamada[date]) novaChamada[date] = {};
                novaChamada[date][militar] = { status, horario, observacao };
                setChamadas(novaChamada);
                try {
                    localStorage.setItem('chamadas', JSON.stringify(novaChamada));
                } catch (e) {
                    console.log('Erro ao salvar em localStorage');
                }
            };

            const adicionarMilitar = () => {
                if (!novoMilitar.nome.trim()) {
                    alert('Digite o nome do militar!');
                    return;
                }
                
                const novoId = Math.max(...militares.map(m => m.id || 0), 0) + 1;
                const militar = {
                    id: novoId,
                    nome: novoMilitar.nome.toUpperCase(),
                    post: novoMilitar.post
                };
                
                setMilitares([...militares, militar]);
                setNovoMilitar({ nome: '', post: 'Soldado' });
                alert('Militar adicionado com sucesso!');
            };

            const editarMilitar = (id) => {
                const militar = militares.find(m => m.id === id);
                setMilitarEmEdicao(militar);
            };

            const salvarEdicao = () => {
                if (!militarEmEdicao.nome.trim()) {
                    alert('Digite o nome do militar!');
                    return;
                }

                setMilitares(militares.map(m => 
                    m.id === militarEmEdicao.id 
                        ? { ...m, nome: militarEmEdicao.nome.toUpperCase(), post: militarEmEdicao.post }
                        : m
                ));
                setMilitarEmEdicao(null);
                alert('Militar atualizado com sucesso!');
            };

            const deletarMilitar = (id) => {
                if (window.confirm('Tem certeza que deseja deletar este militar?')) {
                    setMilitares(militares.filter(m => m.id !== id));
                    alert('Militar deletado com sucesso!');
                }
            };

            const handleFotoUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        const base64 = event.target.result;
                        setFotoApp(base64);
                        try {
                            localStorage.setItem('fotoApp', base64);
                        } catch (err) {
                            console.log('Erro ao salvar foto');
                        }
                    };
                    reader.readAsDataURL(file);
                }
            };

            const removerFoto = () => {
                setFotoApp('');
                try {
                    localStorage.removeItem('fotoApp');
                } catch (err) {
                    console.log('Erro ao remover foto');
                }
            };

            const calcularEstatisticas = (militarFiltro = '') => {
                const stats = {};
                const listaMilitares = militarFiltro 
                    ? militares.filter(m => m.nome === militarFiltro)
                    : militares;
                
                listaMilitares.forEach(m => {
                    stats[m.nome] = { presente: 0, falta: 0, atrasado: 0, total: 0 };
                });

                Object.keys(chamadas).forEach(date => {
                    if (date.startsWith(selectedMonth)) {
                        Object.keys(chamadas[date]).forEach(militar => {
                            if (stats[militar]) {
                                const { status } = chamadas[date][militar];
                                stats[militar].total++;
                                if (status === 'PRESENTE' || status === 'ATRASADO') stats[militar].presente++;
                                if (status === 'FALTA') stats[militar].falta++;
                                if (status === 'ATRASADO') stats[militar].atrasado++;
                            }
                        });
                    }
                });

                return stats;
            };

            const exportarParaExcel = async () => {
                const datas = Object.keys(chamadas).sort();
                
                if (datas.length === 0) {
                    alert('Nenhuma chamada registrada ainda! Preencha os dados na aba Chamada antes de exportar.');
                    return;
                }

                let htmlContent = `
                  <!DOCTYPE html>
                  <html>
                  <head>
                    <meta charset="UTF-8">
                    <style>
                      body { font-family: Arial, sans-serif; background: #f5f5f5; padding: 20px; }
                      .container { background: white; max-width: 1200px; margin: 0 auto; padding: 40px; }
                      .header { border-bottom: 3px solid #1f2937; padding-bottom: 20px; margin-bottom: 30px; }
                      h1 { color: #1f2937; font-size: 28px; }
                      table { width: 100%; border-collapse: collapse; margin-top: 20px; }
                      th { background: #1f2937; color: white; padding: 15px; text-align: left; font-size: 13px; }
                      td { padding: 12px 15px; border: 1px solid #e5e7eb; font-size: 13px; }
                      tbody tr:nth-child(odd) { background: #f9fafb; }
                    </style>
                  </head>
                  <body>
                    <div class="container">
                      <div class="header">
                        <h1>📋 Relatório de Chamada</h1>
                        <p>Sistema de Controle de Efetivo - 1º GDAAE</p>
                      </div>
                      <table>
                        <thead>
                          <tr>
                            <th>Data</th>
                            <th>Militar</th>
                            <th>Posto</th>
                            <th>Status</th>
                            <th>Horário</th>
                          </tr>
                        </thead>
                        <tbody>
                `;

                datas.forEach(data => {
                    militares.forEach(militar => {
                        const chamadaDados = chamadas[data][militar.nome];
                        if (chamadaDados && chamadaDados.status) {
                            const { status, horario } = chamadaDados;
                            htmlContent += `
                              <tr>
                                <td>${data}</td>
                                <td>${militar.nome}</td>
                                <td>${militar.post}</td>
                                <td>${status}</td>
                                <td>${horario || '-'}</td>
                              </tr>
                            `;
                        }
                    });
                });

                htmlContent += `
                        </tbody>
                      </table>
                    </div>
                  </body>
                  </html>
                `;

                const blob = new Blob([htmlContent], { type: 'text/html;charset=utf-8' });
                const link = document.createElement('a');
                const url = URL.createObjectURL(blob);
                link.setAttribute('href', url);
                link.setAttribute('download', `Relatorio_Chamadas_${new Date().toISOString().slice(0, 10)}.html`);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(url);
            };

            const estatisticas = calcularEstatisticas(selectedMilitar);
            const chamadaDia = getChamadaDodia(selectedDate);
            const expediente = getExpediente(selectedDate);
            const dayName = new Date(selectedDate + 'T00:00:00').toLocaleDateString('pt-BR', { weekday: 'long' });

            const militaresFiltrados = militares.filter(m =>
                m.nome.toLowerCase().includes(busca.toLowerCase()) ||
                m.post.toLowerCase().includes(busca.toLowerCase())
            );

            return (
                <div className="min-h-screen bg-gradient-to-br from-slate-50 via-slate-100 to-slate-200">
                    {/* Header */}
                    <div className="bg-gradient-to-r from-slate-900 via-slate-800 to-slate-900 text-white shadow-2xl">
                        <div className="px-4 py-8">
                            <div className="flex items-center justify-between flex-wrap gap-4">
                                <div className="flex items-center gap-4">
                                    {fotoApp && (
                                        <div className="w-16 h-16 bg-white rounded-lg overflow-hidden shadow-md">
                                            <img src={fotoApp} alt="Logo" className="w-full h-full object-cover" />
                                        </div>
                                    )}
                                    <div>
                                        <h1 className="text-3xl font-bold tracking-tight">Controle de Efetivo</h1>
                                        <p className="text-slate-300 mt-2">Sistema de Chamada e Estatísticas - 1º GDAAE</p>
                                    </div>
                                </div>
                                <div className="text-right text-slate-300">
                                    <p>Total de Militares: <span className="text-white font-bold text-xl">{militares.length}</span></p>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Tabs */}
                    <div className="px-4 mt-8">
                        <div className="flex gap-2 bg-white rounded-t-lg shadow-md p-4 border-b-4 border-slate-900 flex-wrap">
                            <button
                                onClick={() => setActiveTab('chamada')}
                                className={`px-6 py-3 rounded-lg font-semibold transition-all ${
                                    activeTab === 'chamada'
                                        ? 'bg-slate-900 text-white shadow-md'
                                        : 'bg-slate-100 text-slate-700 hover:bg-slate-200'
                                }`}
                            >
                                📋 Chamada
                            </button>
                            <button
                                onClick={() => setActiveTab('estatisticas')}
                                className={`px-6 py-3 rounded-lg font-semibold transition-all ${
                                    activeTab === 'estatisticas'
                                        ? 'bg-slate-900 text-white shadow-md'
                                        : 'bg-slate-100 text-slate-700 hover:bg-slate-200'
                                }`}
                            >
                                📊 Estatísticas
                            </button>
                            <button
                                onClick={() => setActiveTab('militares')}
                                className={`px-6 py-3 rounded-lg font-semibold transition-all ${
                                    activeTab === 'militares'
                                        ? 'bg-slate-900 text-white shadow-md'
                                        : 'bg-slate-100 text-slate-700 hover:bg-slate-200'
                                }`}
                            >
                                👥 Militares
                            </button>
                            <button
                                onClick={() => setActiveTab('configuracoes')}
                                className={`px-6 py-3 rounded-lg font-semibold transition-all ${
                                    activeTab === 'configuracoes'
                                        ? 'bg-slate-900 text-white shadow-md'
                                        : 'bg-slate-100 text-slate-700 hover:bg-slate-200'
                                }`}
                            >
                                ⚙️ Configurações
                            </button>
                        </div>

                        {/* Conteúdo */}
                        <div className="bg-white rounded-b-lg shadow-lg p-6">
                            {activeTab === 'chamada' && (
                                <div className="space-y-6">
                                    <div className="bg-gradient-to-r from-slate-50 to-blue-50 p-6 rounded-lg border-2 border-slate-200">
                                        <label className="block text-sm font-bold text-slate-700 mb-3">
                                            📅 Selecione a Data da Chamada
                                        </label>
                                        <div className="flex gap-4 items-end flex-wrap">
                                            <div>
                                                <input
                                                    type="date"
                                                    value={selectedDate}
                                                    onChange={(e) => setSelectedDate(e.target.value)}
                                                    className="px-4 py-3 border-2 border-slate-300 rounded-lg font-semibold text-slate-900 focus:border-slate-900 focus:outline-none"
                                                />
                                            </div>
                                            <div>
                                                <p className="text-sm text-slate-600">Dia da semana:</p>
                                                <p className="text-lg font-bold text-slate-900 capitalize">{dayName}</p>
                                            </div>
                                            <div>
                                                <p className="text-sm text-slate-600">Expediente:</p>
                                                <p className="text-lg font-bold text-slate-900">{expediente.inicio} - {expediente.fim}</p>
                                            </div>
                                            <button
                                                onClick={exportarParaExcel}
                                                className="ml-auto bg-green-600 hover:bg-green-700 text-white px-6 py-3 rounded-lg font-semibold flex items-center gap-2 transition-all"
                                            >
                                                📥 Exportar
                                            </button>
                                        </div>
                                    </div>

                                    <div className="space-y-3">
                                        <h3 className="text-xl font-bold text-slate-900 mb-4">Setor Único</h3>
                                        <div className="grid gap-3 max-h-96 overflow-y-auto">
                                            {militares.map((militar) => {
                                                const dados = chamadaDia[militar.nome];
                                                return (
                                                    <div key={militar.id} className="bg-slate-50 border-2 border-slate-200 rounded-lg p-4 hover:border-slate-400 transition-all">
                                                        <div className="flex items-center gap-3 flex-wrap">
                                                            <div className="min-w-40">
                                                                <p className="font-bold text-slate-900 text-sm">{militar.nome}</p>
                                                                <p className="text-xs text-slate-600">{militar.post}</p>
                                                            </div>
                                                            
                                                            <select
                                                                value={dados?.status || ''}
                                                                onChange={(e) => salvarChamada(selectedDate, militar.nome, e.target.value, dados?.horario || '', dados?.observacao || '')}
                                                                className="px-3 py-2 border-2 border-slate-300 rounded-lg font-semibold text-xs focus:border-slate-900 focus:outline-none"
                                                            >
                                                                <option value="">- Selecione -</option>
                                                                <option value="PRESENTE">✓ PRESENTE</option>
                                                                <option value="ATRASADO">⏰ ATRASADO</option>
                                                                <option value="FALTA">✗ FALTA</option>
                                                                <option value="CURSO">📚 CURSO</option>
                                                                <option value="MISSÃO">🎖️ MISSÃO</option>
                                                                <option value="FÉRIAS">🏖️ FÉRIAS</option>
                                                                <option value="DISPENSA MÉDICA">⚕️ DISPENSA MÉDICA</option>
                                                                <option value="DISPENSADO">📄 DISPENSADO</option>
                                                                <option value="SERVIÇO">⚙️ SERVIÇO</option>
                                                            </select>

                                                            {(dados?.status === 'PRESENTE' || dados?.status === 'ATRASADO') && (
                                                                <input
                                                                    type="time"
                                                                    value={dados?.horario || ''}
                                                                    onChange={(e) => salvarChamada(selectedDate, militar.nome, dados.status, e.target.value, dados.observacao)}
                                                                    className="px-3 py-2 border-2 border-slate-300 rounded-lg font-semibold text-xs focus:border-slate-900 focus:outline-none"
                                                                />
                                                            )}

                                                            {['CURSO', 'MISSÃO', 'FÉRIAS', 'DISPENSA MÉDICA', 'DISPENSADO'].includes(dados?.status) && (
                                                                <input
                                                                    type="text"
                                                                    value={dados?.observacao || ''}
                                                                    onChange={(e) => salvarChamada(selectedDate, militar.nome, dados.status, '', e.target.value)}
                                                                    placeholder="Período/Obs"
                                                                    className="px-3 py-2 border-2 border-slate-300 rounded-lg font-semibold text-xs flex-1 min-w-32 focus:border-slate-900 focus:outline-none"
                                                                />
                                                            )}

                                                            <span className={`text-xs font-bold text-white px-2 py-1 rounded ${
                                                                dados?.status === 'PRESENTE' ? 'bg-green-600' :
                                                                dados?.status === 'FALTA' ? 'bg-red-600' :
                                                                dados?.status === 'ATRASADO' ? 'bg-yellow-600' :
                                                                'bg-slate-600'
                                                            }`}>
                                                                {dados?.status || '-'}
                                                            </span>
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                </div>
                            )}

                            {activeTab === 'estatisticas' && (
                                <div className="space-y-6">
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <div className="bg-gradient-to-r from-slate-50 to-green-50 p-6 rounded-lg border-2 border-slate-200">
                                            <label className="block text-sm font-bold text-slate-700 mb-3">
                                                Selecione o Mês
                                            </label>
                                            <input
                                                type="month"
                                                value={selectedMonth}
                                                onChange={(e) => setSelectedMonth(e.target.value)}
                                                className="px-4 py-3 border-2 border-slate-300 rounded-lg font-semibold text-slate-900 focus:border-slate-900 focus:outline-none w-full"
                                            />
                                        </div>

                                        <div className="bg-gradient-to-r from-slate-50 to-purple-50 p-6 rounded-lg border-2 border-slate-200">
                                            <label className="block text-sm font-bold text-slate-700 mb-3">
                                                Filtrar por Militar
                                            </label>
                                            <select
                                                value={selectedMilitar}
                                                onChange={(e) => setSelectedMilitar(e.target.value)}
                                                className="px-4 py-3 border-2 border-slate-300 rounded-lg font-semibold text-slate-900 focus:border-slate-900 focus:outline-none w-full"
                                            >
                                                <option value="">- Todos -</option>
                                                {militares.map((m) => (
                                                    <option key={m.id} value={m.nome}>{m.nome}</option>
                                                ))}
                                            </select>
                                        </div>
                                    </div>

                                    {selectedMilitar && (
                                        <div className="bg-blue-50 border-2 border-blue-300 p-6 rounded-lg">
                                            <h3 className="text-2xl font-bold text-blue-900 mb-4">📊 {selectedMilitar}</h3>
                                            <div className="grid grid-cols-2 md:grid-cols-5 gap-4">
                                                <div className="bg-white p-4 rounded-lg border-2 border-blue-300 text-center">
                                                    <p className="text-gray-600 text-sm font-semibold">Dias</p>
                                                    <p className="text-3xl font-bold text-blue-600">{estatisticas[selectedMilitar]?.total || 0}</p>
                                                </div>
                                                <div className="bg-white p-4 rounded-lg border-2 border-green-300 text-center">
                                                    <p className="text-gray-600 text-sm font-semibold">Presentes</p>
                                                    <p className="text-3xl font-bold text-green-600">{estatisticas[selectedMilitar]?.presente || 0}</p>
                                                </div>
                                                <div className="bg-white p-4 rounded-lg border-2 border-red-300 text-center">
                                                    <p className="text-gray-600 text-sm font-semibold">Faltas</p>
                                                    <p className="text-3xl font-bold text-red-600">{estatisticas[selectedMilitar]?.falta || 0}</p>
                                                </div>
                                                <div className="bg-white p-4 rounded-lg border-2 border-yellow-300 text-center">
                                                    <p className="text-gray-600 text-sm font-semibold">Atrasados</p>
                                                    <p className="text-3xl font-bold text-yellow-600">{estatisticas[selectedMilitar]?.atrasado || 0}</p>
                                                </div>
                                                <div className="bg-white p-4 rounded-lg border-2 border-purple-300 text-center">
                                                    <p className="text-gray-600 text-sm font-semibold">Taxa</p>
                                                    <p className="text-3xl font-bold text-purple-600">
                                                        {estatisticas[selectedMilitar]?.total > 0 
                                                            ? ((estatisticas[selectedMilitar].presente / estatisticas[selectedMilitar].total) * 100).toFixed(1) 
                                                            : 0}%
                                                    </p>
                                                </div>
                                            </div>
                                        </div>
                                    )}

                                    <div className="bg-slate-50 p-6 rounded-lg border-2 border-slate-200 overflow-x-auto">
                                        <h3 className="text-lg font-bold text-slate-900 mb-4">Resumo do Mês</h3>
                                        <table className="w-full text-sm">
                                            <thead className="bg-slate-900 text-white">
                                                <tr>
                                                    <th className="px-4 py-2 text-left">Militar</th>
                                                    <th className="px-4 py-2 text-center">Dias</th>
                                                    <th className="px-4 py-2 text-center">Presentes</th>
                                                    <th className="px-4 py-2 text-center">Faltas</th>
                                                    <th className="px-4 py-2 text-center">Taxa %</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {(selectedMilitar ? militares.filter(m => m.nome === selectedMilitar) : militares).map((m, idx) => {
                                                    const stats = estatisticas[m.nome];
                                                    const taxa = stats.total > 0 ? ((stats.presente / stats.total) * 100).toFixed(1) : 0;
                                                    return (
                                                        <tr key={m.id} className={idx % 2 === 0 ? 'bg-white' : 'bg-slate-100'}>
                                                            <td className="px-4 py-2 font-semibold">{m.nome}</td>
                                                            <td className="px-4 py-2 text-center">{stats.total}</td>
                                                            <td className="px-4 py-2 text-center text-green-700 font-bold">{stats.presente}</td>
                                                            <td className="px-4 py-2 text-center text-red-700 font-bold">{stats.falta}</td>
                                                            <td className="px-4 py-2 text-center font-bold">{taxa}%</td>
                                                        </tr>
                                                    );
                                                })}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            )}

                            {activeTab === 'militares' && (
                                <div className="space-y-6">
                                    <h2 className="text-2xl font-bold text-slate-900">👥 Gerenciar Militares</h2>

                                    <div className="bg-gradient-to-r from-blue-50 to-indigo-50 p-6 rounded-lg border-2 border-blue-300">
                                        <h3 className="text-lg font-bold text-blue-900 mb-4">➕ Adicionar Novo Militar</h3>
                                        <div className="flex gap-4 flex-wrap">
                                            <input
                                                type="text"
                                                value={novoMilitar.nome}
                                                onChange={(e) => setNovoMilitar({ ...novoMilitar, nome: e.target.value })}
                                                placeholder="Nome do militar"
                                                className="px-4 py-3 border-2 border-blue-300 rounded-lg font-semibold text-slate-900 focus:border-blue-600 focus:outline-none flex-1 min-w-48"
                                            />
                                            <select
                                                value={novoMilitar.post}
                                                onChange={(e) => setNovoMilitar({ ...novoMilitar, post: e.target.value })}
                                                className="px-4 py-3 border-2 border-blue-300 rounded-lg font-semibold text-slate-900 focus:border-blue-600 focus:outline-none"
                                            >
                                                <option value="Soldado">Soldado</option>
                                                <option value="Cabo">Cabo</option>
                                                <option value="Sargento">Sargento</option>
                                                <option value="Subtenente">Subtenente</option>
                                                <option value="Tenente">Tenente</option>
                                                <option value="Capitão">Capitão</option>
                                                <option value="Major">Major</option>
                                            </select>
                                            <button
                                                onClick={adicionarMilitar}
                                                className="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-lg font-semibold transition-all"
                                            >
                                                ➕ Adicionar
                                            </button>
                                        </div>
                                    </div>

                                    <input
                                        type="text"
                                        value={busca}
                                        onChange={(e) => setBusca(e.target.value)}
                                        placeholder="🔍 Buscar por nome ou posto..."
                                        className="w-full px-4 py-3 border-2 border-slate-300 rounded-lg font-semibold text-slate-900 focus:border-slate-900 focus:outline-none"
                                    />

                                    <div className="space-y-2">
                                        <h3 className="text-lg font-bold text-slate-900 mb-4">
                                            Lista de Militares ({militaresFiltrados.length})
                                        </h3>
                                        <div className="grid gap-3 max-h-96 overflow-y-auto">
                                            {militaresFiltrados.map((militar) => (
                                                <div key={militar.id} className="bg-slate-50 border-2 border-slate-200 rounded-lg p-4 hover:border-slate-400 transition-all">
                                                    <div className="flex items-center justify-between gap-4 flex-wrap">
                                                        <div className="flex-1">
                                                            <p className="font-bold text-slate-900">{militar.nome}</p>
                                                            <p className="text-sm text-slate-600">{militar.post}</p>
                                                        </div>
                                                        <div className="flex gap-2">
                                                            <button
                                                                onClick={() => editarMilitar(militar.id)}
                                                                className="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-semibold text-sm transition-all"
                                                            >
                                                                ✏️ Editar
                                                            </button>
                                                            <button
                                                                onClick={() => deletarMilitar(militar.id)}
                                                                className="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-lg font-semibold text-sm transition-all"
                                                            >
                                                                🗑️ Deletar
                                                            </button>
                                                        </div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>

                                    {militarEmEdicao && (
                                        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
                                            <div className="bg-white rounded-lg p-6 max-w-md w-full shadow-2xl">
                                                <h3 className="text-2xl font-bold text-slate-900 mb-4">✏️ Editar Militar</h3>
                                                <div className="space-y-4">
                                                    <input
                                                        type="text"
                                                        value={militarEmEdicao.nome}
                                                        onChange={(e) => setMilitarEmEdicao({ ...militarEmEdicao, nome: e.target.value })}
                                                        className="w-full px-4 py-2 border-2 border-slate-300 rounded-lg font-semibold text-slate-900 focus:border-slate-900 focus:outline-none"
                                                    />
                                                    <select
                                                        value={militarEmEdicao.post}
                                                        onChange={(e) => setMilitarEmEdicao({ ...militarEmEdicao, post: e.target.value })}
                                                        className="w-full px-4 py-2 border-2 border-slate-300 rounded-lg font-semibold text-slate-900 focus:border-slate-900 focus:outline-none"
                                                    >
                                                        <option value="Soldado">Soldado</option>
                                                        <option value="Cabo">Cabo</option>
                                                        <option value="Sargento">Sargento</option>
                                                        <option value="Subtenente">Subtenente</option>
                                                        <option value="Tenente">Tenente</option>
                                                        <option value="Capitão">Capitão</option>
                                                        <option value="Major">Major</option>
                                                    </select>
                                                    <div className="flex gap-2 pt-4">
                                                        <button
                                                            onClick={salvarEdicao}
                                                            className="flex-1 bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-semibold transition-all"
                                                        >
                                                            Salvar
                                                        </button>
                                                        <button
                                                            onClick={() => setMilitarEmEdicao(null)}
                                                            className="flex-1 bg-slate-400 hover:bg-slate-500 text-white px-4 py-2 rounded-lg font-semibold transition-all"
                                                        >
                                                            Cancelar
                                                        </button>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            )}

                            {activeTab === 'configuracoes' && (
                                <div className="space-y-6">
                                    <h2 className="text-2xl font-bold text-slate-900">⚙️ Configurações</h2>
                                    
                                    <div className="bg-gradient-to-r from-blue-50 to-indigo-50 p-6 rounded-lg border-2 border-blue-300">
                                        <h3 className="text-lg font-bold text-blue-900 mb-4">📸 Logo/Foto da Instituição</h3>
                                        {fotoApp && (
                                            <div className="mb-4 flex items-center gap-4">
                                                <div className="w-32 h-32 bg-white rounded-lg overflow-hidden shadow-md border-2 border-blue-300">
                                                    <img src={fotoApp} alt="Foto atual" className="w-full h-full object-cover" />
                                                </div>
                                                <button
                                                    onClick={removerFoto}
                                                    className="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-lg font-semibold transition-all"
                                                >
                                                    🗑️ Remover
                                                </button>
                                            </div>
                                        )}
                                        <label className="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-lg font-semibold flex items-center gap-2 cursor-pointer transition-all inline-block">
                                            📤 Selecionar Foto
                                            <input
                                                type="file"
                                                accept="image/*"
                                                onChange={handleFotoUpload}
                                                className="hidden"
                                            />
                                        </label>
                                    </div>

                                    <div className="bg-gradient-to-r from-purple-50 to-pink-50 p-6 rounded-lg border-2 border-purple-300">
                                        <h3 className="text-lg font-bold text-purple-900 mb-4">ℹ️ Informações</h3>
                                        <div className="space-y-2 text-sm text-slate-700">
                                            <p><strong>Versão:</strong> 2.0.0 Web</p>
                                            <p><strong>Militares:</strong> {militares.length}</p>
                                            <p><strong>Chamadas:</strong> {Object.keys(chamadas).length} dias</p>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>

                    <div className="px-4 mt-8 mb-8">
                        <div className="bg-white rounded-lg shadow-md p-4 text-center text-slate-600 text-sm">
                            <p>Dados salvos automaticamente • App Web Version 2.0.0</p>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<EfetevoApp />);
    </script>
</body>
</html>
